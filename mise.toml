# Default tool versions for common multi-language development when this
# directory is mounted at /work (e.g. `task setup` / `task shell` from the
# flavor root). App repos should ship their own mise.toml; this is a starter set.
#
# Inside the image, tools install under MISE_DATA_DIR (/cache/mise).
# `task warm` / `bin/warm` runs `mise install` when this file is present.
#
# Pins live here (node/python/yarn/task) or in the Gemfile (ruby "…"). Do not use
# .tool-versions, .ruby-version, .node-version, or .python-version.
#
# Ruby: Gemfile `ruby "…"` via idiomatic version files (no pin under [tools]
# when mise can parse the version — single-digit segments per component).

min_version = "2025.8.0"

[settings]
# Prefer precompiled Ruby (jdx/ruby) for speed. Images also ship compile
# toolchains so ruby-build / native gems still work when needed
# (ruby.compile = true or missing prebuild).
ruby.compile = false
idiomatic_version_file_enable_tools = ["ruby"]

[tools]
# Node.js 24 — Active LTS (prefer LTS over Current for app work)
node = "24.18.0"
# Yarn classic — still the usual default with yarn.lock / many Rails apps.
# Berry (Yarn 4): `mise use yarn@4` or enable Corepack on Node.
yarn = "1.22.22"
# Python 3.13 — current 3.13 line with broad package support
python = "3.13.14"
# Task (go-task) — host UX in Taskfile.yml; install via mise when this dir is /work
task = "3.52.0"
